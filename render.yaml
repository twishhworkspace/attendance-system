services:
  - type: web
    name: attendance-backend
    env: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: attendance-db
    plan: free
    databaseName: attendancedb
    user: postgres
    region: frankfurt
